services:
  - type: web
    name: resume-analyzer
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./resume_analyzer.db
      - key: CORS_ORIGINS
        value: http://localhost:3000
